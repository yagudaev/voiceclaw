# Build, sign, notarize, and publish the macOS desktop DMG on tag push.
#
# Trigger: push of a tag matching `desktop-v*.*.*` (e.g. `desktop-v0.1.0`).
# Output: a GitHub Release matching the tag, containing the universal
#         DMG, its `.blockmap`, and `latest-mac.yml` for electron-updater.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   APPLE_API_KEY_P8
#     Base64-encoded contents of the App Store Connect API key .p8 file.
#     Generate locally with: `base64 -i AuthKey_<ID>.p8 | pbcopy`.
#   APPLE_API_KEY_ID
#     The App Store Connect API key ID (e.g. `SG645CPQP8`).
#   APPLE_API_ISSUER
#     The App Store Connect issuer UUID
#     (e.g. `69a6de83-015f-47e3-e053-5b8c7c11a4d1`).
#   DEVELOPER_ID_CERT_P12
#     Base64-encoded .p12 export of the "Developer ID Application"
#     certificate (including its private key).
#     Generate with Keychain Access → right-click cert → Export → .p12,
#     then: `base64 -i cert.p12 | pbcopy`.
#   DEVELOPER_ID_CERT_PASSWORD
#     The password you chose when exporting the .p12.
#
# The default `GITHUB_TOKEN` secret is injected automatically; no manual
# config needed for the GitHub Releases upload.

name: Release desktop

on:
  push:
    tags:
      - "desktop-v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (must already exist on origin)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build universal DMG
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}
          submodules: recursive

      - name: Enable corepack
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "yarn"

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Build openclaw
        working-directory: vendor/openclaw
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Cache electron-builder downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-builder-${{ hashFiles('desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-builder-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstore
          printf '%s' "$APPLE_API_KEY_P8" | base64 --decode > ~/.appstore/AuthKey_${APPLE_API_KEY_ID}.p8
          chmod 600 ~/.appstore/AuthKey_${APPLE_API_KEY_ID}.p8

      - name: Inspect Developer ID p12 (subject + private-key check)
        env:
          CSC_LINK: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set +x
          cert="$(mktemp)"
          printf '%s' "$CSC_LINK" | base64 --decode > "$cert"
          openssl pkcs12 -in "$cert" -nokeys -passin pass:"$CSC_KEY_PASSWORD" 2>/dev/null \
            | openssl x509 -noout -subject -issuer -dates
          openssl pkcs12 -in "$cert" -nocerts -nodes -passin pass:"$CSC_KEY_PASSWORD" 2>/dev/null \
            | openssl pkey -noout -check >/dev/null 2>&1 \
            && echo "p12 contains a valid private key" \
            || { echo "FAIL: p12 has no private key (or wrong password / corrupted base64)"; exit 1; }
          rm -f "$cert"

      - name: Resolve build metadata
        id: meta
        run: |
          echo "git_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "relay_version=$(node -p "require('./relay-server/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build, sign, notarize
        working-directory: desktop
        env:
          # CSC_LINK + CSC_KEY_PASSWORD let electron-builder import the
          # Developer ID cert into its own temporary keychain.
          CSC_LINK: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          # Fail loudly instead of silently falling back to an ad-hoc
          # signature that Apple notarytool will then reject.
          CSC_FOR_PULL_REQUEST: "true"
          # Verbose electron-builder logs while we are still debugging
          # the macos-14 signing path.
          DEBUG: electron-builder
          # APPLE_API_KEY points at the .p8 written above; the id/issuer
          # pair lets notarytool auth without username/password.
          APPLE_API_KEY: ${{ format('/Users/runner/.appstore/AuthKey_{0}.p8', secrets.APPLE_API_KEY_ID) }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # Forwarded to the bundled relay at runtime so trace metadata
          # has accurate version + commit even though the packaged
          # binary can't shell out to git.
          GIT_SHA: ${{ steps.meta.outputs.git_sha }}
          RELAY_VERSION: ${{ steps.meta.outputs.relay_version }}
          # PostHog telemetry tokens. VITE_* is picked up by the renderer
          # bundle; NEXT_PUBLIC_* is accepted by the main-process posthog-node
          # wrapper. Both must be set for full coverage.
          VITE_POSTHOG_PROJECT_TOKEN: ${{ secrets.VITE_POSTHOG_PROJECT_TOKEN }}
          NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ secrets.VITE_POSTHOG_PROJECT_TOKEN }}
        run: yarn dist:mac --publish never -c.forceCodeSigning=true

      # Launch the freshly-signed-and-notarized .app against an isolated
      # HOME so it gets a clean userData dir, settle for 10s, and assert
      # the main process is still alive with no `Cannot find module` /
      # uncaught-exception patterns. Catches the class of regression where
      # native modules (better-sqlite3) or workspace-hoisted prod deps
      # silently fail to land in app.asar / app.asar.unpacked.
      - name: Smoke-test packaged app
        working-directory: desktop
        run: yarn smoke:mac

      # release-please-action creates the GitHub Release synchronously with
      # the tag push, so electron-builder's `--publish always` raced it and
      # got 422 already_exists. Upload directly to the existing release with
      # the gh CLI — idempotent (`--clobber`) and free of that race.
      - name: Upload DMG to GitHub Release
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" \
            dist/*.dmg \
            dist/*.blockmap \
            dist/latest-mac.yml \
            --clobber

      - name: Publish update feed to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          cp desktop/dist/latest-mac.yml desktop/releases/latest-mac.yml
          git add desktop/releases/latest-mac.yml
          git diff --cached --quiet && echo "No feed change" && exit 0
          git commit -m "chore(desktop): update release feed for ${TAG}"
          git push origin main

      - name: Publish release (flip from draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release edit "$TAG" --repo "$REPO" --draft=false --latest

      - name: Upload DMG as workflow artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: voiceclaw-dmg
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.blockmap
            desktop/dist/latest-mac.yml
          if-no-files-found: warn
          retention-days: 14
