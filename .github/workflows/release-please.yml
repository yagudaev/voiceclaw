# Auto-generate a "release PR" each time conventional-commit changes land on
# main. Merging the release PR bumps version files + CHANGELOG.md and pushes
# the matching tag. The desktop tag (`desktop-v*.*.*`) then triggers
# `release-desktop.yml` which builds + publishes the signed DMG.
#
# Docs: https://github.com/googleapis/release-please-action
# Required secret:
#   - RELEASE_PLEASE_TOKEN — PAT or GitHub App token that can create PRs,
#     push tags, and trigger downstream workflows from those tags.
#
# Config:
#   - release-please-config.json    — per-package release-type + tag scheme
#   - .release-please-manifest.json — source of truth for current versions
#
# Tag scheme (from release-please-config.json):
#   desktop → desktop-v0.1.0, …   (triggers release-desktop.yml)
#   mobile  → mobile-v0.1.0, …

name: Release please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Let the action discover config + manifest at the repo root.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # Do not use the default GITHUB_TOKEN here: GitHub suppresses most
          # workflows caused by GITHUB_TOKEN-created refs, so desktop release
          # tags would not reliably trigger release-desktop.yml.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
