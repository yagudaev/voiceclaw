appId: com.getvoiceclaw.desktop
productName: VoiceClaw
copyright: "Copyright © 2026 Nano 3 Labs Ltd."

# `app: dist-staging` points electron-builder at a self-contained
# package directory produced by `scripts/stage-app.mjs`. The staging dir
# has its own `package.json` listing only prod deps and a clean
# `node_modules/` installed by npm — no yarn workspaces in sight. Without
# this, electron-builder's `npm list` walks up to the workspace root and
# treats the root's hoisted transitives as the app's dependencies,
# silently dropping every package declared in `desktop/package.json`.
directories:
  app: dist-staging
  output: dist
  buildResources: build

files:
  - "out/**/*"
  - "package.json"
  - "node_modules/**/*"
  - "!node_modules/**/{README.md,LICENSE*,*.map,*.ts}"

# Native modules with .node bindings cannot be loaded from inside an
# asar — Electron requires them to live in app.asar.unpacked/ and
# resolves the require there transparently. Without this, the main
# process crashes at startup with `Cannot find module 'better-sqlite3'`.
asarUnpack:
  - "**/node_modules/better-sqlite3/**/*"

# Anything under desktop/resources/ ships into <App>/Contents/Resources/
# at the same relative path. Includes the bundled Node runtime
# (resources/bin/node, fetched by scripts/fetch-node.mjs) and the
# tsc-built relay (resources/relay-server-bundle/, produced by
# `yarn workspace relay-server build:bundle`).
extraResources:
  - from: "resources"
    to: "."
    filter:
      - "**/*"
      - "!**/*.{md,LICENSE*,*.map,*.ts}"
      - "!**/CHANGELOG*"

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64

  # Hardened Runtime + entitlements are required for notarization.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

  # Descriptions that appear when macOS prompts for permission.
  extendInfo:
    NSMicrophoneUsageDescription: "VoiceClaw uses your microphone to send voice to the AI provider you configured (Google Gemini, OpenAI, or xAI) for real-time conversation. Audio streams directly to the provider — nothing is stored on our servers."
    NSCameraUsageDescription: "VoiceClaw only uses your camera when you explicitly start a video-enabled session. It is otherwise idle."
    NSScreenCaptureUsageDescription: "VoiceClaw can share your screen with the AI on demand, so it can see what you're looking at when you ask it to. Sharing is off until you start it."

  notarize: true

dmg:
  title: "VoiceClaw ${version}"
  icon: build/icon.icns
  iconSize: 96
  contents:
    - x: 140
      y: 200
      type: file
    - x: 420
      y: 200
      type: link
      path: /Applications

# Publish target for the CI release pipeline. electron-updater reads
# the generated `app-update.yml` inside the packaged .app at runtime to
# know where to check for new versions, so this block is required even
# if we never invoke `electron-builder --publish`. Local builds pass
# `--publish never` from the `dist:mac` script so they never attempt to
# upload regardless of whether GH_TOKEN is set in the shell.
publish:
  provider: github
  owner: yagudaev
  repo: voiceclaw
  releaseType: release
  # Match the release-please tag scheme so electron-builder publishes to
  # the existing `desktop-v<version>` release instead of creating a new
  # `v<version>` one (the default).
  tagNamePrefix: desktop-v
